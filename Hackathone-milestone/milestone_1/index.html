<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Resume Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Resume Builder Form -->
        <div class="form-container">
            <h1>Resume Builder</h1>
            <form id="resume-form">
                <fieldset>
                    <legend>Personal Information</legend>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                    
                    <label for="contact">Contact Details:</label>
                    <input type="text" id="contact" name="contact" required>
                </fieldset>
                
                <fieldset>
                    <legend>Education</legend>
                    <textarea id="education" name="education" placeholder="Enter your education details here..." required></textarea>
                </fieldset>
                
                <fieldset id="skills-section">
                    <legend >Skills</legend>
                    <textarea id="skills" name="skills" placeholder="Enter your skills here..." required></textarea>
                </fieldset>
                <button id="toggle-skills">Toggle Skills</button>
                
                <fieldset>
                    <legend>Work Experience</legend>
                    <textarea id="work-experience" name="work-experience" placeholder="Enter your work experience here..." required></textarea>
                </fieldset>
                
                <button type="submit">Generate Resume</button>
            </form>
        </div>
        
    </div> 
    <script src="app.js"></script>
</body>
</html>
